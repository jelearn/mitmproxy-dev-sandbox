version: "3.9"

services:
  composed-sandbox:
    # TODO: Ideally, somthing like this:
    #container_name: ${AGENT_SANDBOX_NAME:-${COMPOSE_PROJECT_NAME}}
    # NOTE: podman compose does not fully implement the interpolation parser
    # so the above is not possible, so the work around is:
    container_name: ${AGENT_SANDBOX_NAME:-mitmproxy-dev-sandbox}
    build:
      context: .
      dockerfile: Containerfile
    # disable ipv6 to focus on ipv4 iptable rules
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
      - net.ipv6.conf.lo.disable_ipv6=1
    #cap_drop:
    #  - ALL
    cap_add:
      - NET_ADMIN
      #- NET_RAW
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:${AGENT_SANDBOX_PORT:-6080}:6080"
    environment:
      - SCREEN_RESOLUTION=${SCREEN_RESOLUTION:-1600x900x24}
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-Developer}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-dev@sandbox.local}
    mem_limit: 8g
    cpus: "4.0"
    shm_size: 1g
    restart: unless-stopped
    volumes:
      # TODO: Investigate if the workspace can come from
      # the local file system in ./sandbox
      - workspace_data:/home/coder/workspace
      - vscode_extensions:/home/coder/.local/share/code-server/extensions
      - claude_ai:/home/coder/.claude
      # Persist opencode config (providers, settings) across container rebuilds
      - opencode_config:/home/coder/.config/opencode
      # Persist mitmproxy CA cert so Chromium's NSS trust stays
      # valid across container restarts without reinstalling the cert
      - mitmproxy_ca:/opt/mitmproxy-ca

volumes:
  workspace_data:
  vscode_extensions:
  mitmproxy_ca:
  claude_ai:
  opencode_config:
